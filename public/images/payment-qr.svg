<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- White background -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- QR Code pattern - Payment QR -->
  <g fill="black">
    <!-- Top-left finder pattern -->
    <rect x="10" y="10" width="50" height="50"/>
    <rect x="15" y="15" width="40" height="40" fill="white"/>
    <rect x="20" y="20" width="30" height="30"/>
    
    <!-- Top-right finder pattern -->
    <rect x="140" y="10" width="50" height="50"/>
    <rect x="145" y="15" width="40" height="40" fill="white"/>
    <rect x="150" y="20" width="30" height="30"/>
    
    <!-- Bottom-left finder pattern -->
    <rect x="10" y="140" width="50" height="50"/>
    <rect x="15" y="145" width="40" height="40" fill="white"/>
    <rect x="20" y="150" width="30" height="30"/>
    
    <!-- Timing patterns -->
    <rect x="60" y="32" width="8" height="8"/>
    <rect x="76" y="32" width="8" height="8"/>
    <rect x="92" y="32" width="8" height="8"/>
    <rect x="108" y="32" width="8" height="8"/>
    <rect x="124" y="32" width="8" height="8"/>
    
    <rect x="32" y="60" width="8" height="8"/>
    <rect x="32" y="76" width="8" height="8"/>
    <rect x="32" y="92" width="8" height="8"/>
    <rect x="32" y="108" width="8" height="8"/>
    <rect x="32" y="124" width="8" height="8"/>
    
    <!-- Data modules - payment specific pattern -->
    <!-- Row 1 -->
    <rect x="60" y="60" width="8" height="8"/>
    <rect x="76" y="60" width="8" height="8"/>
    <rect x="92" y="60" width="8" height="8"/>
    <rect x="108" y="60" width="8" height="8"/>
    <rect x="124" y="60" width="8" height="8"/>
    
    <!-- Row 2 -->
    <rect x="60" y="76" width="8" height="8"/>
    <rect x="76" y="76" width="8" height="8"/>
    <rect x="92" y="76" width="8" height="8"/>
    <rect x="108" y="76" width="8" height="8"/>
    <rect x="124" y="76" width="8" height="8"/>
    
    <!-- Row 3 -->
    <rect x="60" y="92" width="8" height="8"/>
    <rect x="76" y="92" width="8" height="8"/>
    <rect x="92" y="92" width="8" height="8"/>
    <rect x="108" y="92" width="8" height="8"/>
    <rect x="124" y="92" width="8" height="8"/>
    
    <!-- Row 4 -->
    <rect x="60" y="108" width="8" height="8"/>
    <rect x="76" y="108" width="8" height="8"/>
    <rect x="92" y="108" width="8" height="8"/>
    <rect x="108" y="108" width="8" height="8"/>
    <rect x="124" y="108" width="8" height="8"/>
    
    <!-- Row 5 -->
    <rect x="60" y="124" width="8" height="8"/>
    <rect x="76" y="124" width="8" height="8"/>
    <rect x="92" y="124" width="8" height="8"/>
    <rect x="108" y="124" width="8" height="8"/>
    <rect x="124" y="124" width="8" height="8"/>
    
    <!-- Additional data modules for realistic look -->
    <rect x="68" y="68" width="4" height="4"/>
    <rect x="84" y="68" width="4" height="4"/>
    <rect x="100" y="68" width="4" height="4"/>
    <rect x="116" y="68" width="4" height="4"/>
    
    <rect x="68" y="84" width="4" height="4"/>
    <rect x="84" y="84" width="4" height="4"/>
    <rect x="100" y="84" width="4" height="4"/>
    <rect x="116" y="84" width="4" height="4"/>
    
    <rect x="68" y="100" width="4" height="4"/>
    <rect x="84" y="100" width="4" height="4"/>
    <rect x="100" y="100" width="4" height="4"/>
    <rect x="116" y="100" width="4" height="4"/>
    
    <rect x="68" y="116" width="4" height="4"/>
    <rect x="84" y="116" width="4" height="4"/>
    <rect x="100" y="116" width="4" height="4"/>
    <rect x="116" y="116" width="4" height="4"/>
  </g>
  
  <!-- Center logo area -->
  <rect x="82" y="82" width="36" height="36" fill="white" rx="4"/>
  <text x="100" y="106" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E91E63" text-anchor="middle">Pay</text>
</svg>
